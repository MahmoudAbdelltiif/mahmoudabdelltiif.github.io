      <!-- Right: Contact Form -->
      <div class="reveal-right">
        <form class="contact-form" id="contactForm" method="POST">
          <div class="form-row">
            <div class="form-group">
              <label for="name">Full Name <span class="required">*</span></label>
              <input type="text" id="name" name="name" placeholder="Your name" required>
            </div>
            <div class="form-group">
              <label for="email">Email <span class="required">*</span></label>
              <input type="email" id="email" name="email" placeholder="your@email.com" required>
            </div>
          </div>

          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone" placeholder="+20 XXX XXX XXXX">
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="service">Service Needed</label>
              <select id="service" name="service">
                <option value="" disabled selected>Select a service</option>
                <option value="Media Buying">Media Buying</option>
                <option value="Tracking Setup">Tracking Setup</option>
                <option value="Strategy Consulting">Strategy Consulting</option>
                <option value="Full Campaign Management">Full Campaign Management</option>
              </select>
            </div>
            <div class="form-group">
              <label for="budget">Budget Range</label>
              <select id="budget" name="budget">
                <option value="" disabled selected>Select budget (optional)</option>
                <option value="< $1K">&lt; $1K</option>
                <option value="$1K - $5K">$1K – $5K</option>
                <option value="$5K - $20K">$5K – $20K</option>
                <option value="$20K+">$20K+</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label for="message">Message <span class="required">*</span></label>
            <textarea id="message" name="message" placeholder="Tell me about your project and goals..." minlength="10" required></textarea>
          </div>

          <div class="form-submit">
            <button type="submit" class="btn-primary">
              <span class="btn-content">
                Send Message
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
              </span>
            </button>
          </div>
        </form>
